spring.application.name=DispatchIQ

# Server
server.port=8080

# Actuator — expose all endpoints for the demo
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging — set to FINE to see per-match logs during demo
logging.level.com.dispatchiq=INFO

# Disable Spring Boot banner (cleaner startup logs)
spring.main.banner-mode=off
